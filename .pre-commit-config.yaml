repos:
- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
    - id: pyupgrade
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.13.9
  hooks:
    - id: commitizen
    - id: commitizen-branch
      stages:
        - manual 
- repo: https://github.com/pycqa/isort
  rev: 8.0.1
  hooks:
    - id: isort
- repo: https://github.com/psf/black-pre-commit-mirror
  rev: 26.3.1 
  hooks:
    - id: black
